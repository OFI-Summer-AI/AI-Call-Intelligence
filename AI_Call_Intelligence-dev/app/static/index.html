<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Call Intelligence</title>
<script src="/static/react.min.js"></script>
<script src="/static/react-dom.min.js"></script>
<script src="/static/prop-types.min.js"></script>
<script src="/static/recharts.js"></script>
<script src="/static/tailwind.js"></script>
<script>
tailwind.config={theme:{extend:{colors:{gold:{DEFAULT:'#c9a84c',light:'#fdf8ee',dark:'#a07830',border:'rgba(201,168,76,0.35)'}}}}}
</script>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#fff;color:#111}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:#f0f0f0}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:#c9a84c}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin 1s linear infinite}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .22s ease}
#boot-loader{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px;font-family:system-ui,sans-serif}
#boot-spinner{width:32px;height:32px;border:3px solid #e5e7eb;border-top-color:#c9a84c;border-radius:50%;animation:spin .8s linear infinite}
#boot-msg{font-size:.85rem;color:#6b7280}
</style>
</head>
<body>
<div id="root">
  <div id="boot-loader">
    <div style="font-size:1.1rem;font-weight:700;color:#a07830">Call Intelligence</div>
    <div id="boot-spinner"></div>
    <div id="boot-msg">Loading…</div>
  </div>
</div>
<script>
window.onerror=function(msg,src,line,col,err){
  var el=document.getElementById('boot-loader');
  if(el)el.innerHTML='<div style="padding:24px;font-family:monospace;color:#dc2626;max-width:600px">'
    +'<div style="font-size:1rem;font-weight:700;margin-bottom:8px">JS Error</div>'
    +'<div style="font-size:.8rem;word-break:break-all">'+(err&&err.stack?err.stack:msg)+'</div>'
    +'<div style="margin-top:12px;font-size:.75rem;color:#6b7280">'+src+':'+line+'</div>'
    +'<button onclick="location.reload()" style="margin-top:12px;padding:6px 14px;background:#c9a84c;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:.8rem">Reload</button>'
    +'</div>';
  return false;
};
</script>
<script src="/static/app.js"></script>
</body>
</html>
