<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Call Intelligence</title>
<script src="/static/react.min.js"></script>
<script src="/static/react-dom.min.js"></script>
<script src="/static/prop-types.min.js"></script>
<script src="/static/recharts.js"></script>
<script src="/static/tailwind.js"></script>
<script>
tailwind.config={theme:{extend:{colors:{gold:{DEFAULT:'#c9a84c',light:'#fdf8ee',dark:'#a07830',border:'rgba(201,168,76,0.35)'}}}}}
</script>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#fff;color:#111}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:#f5f5f5}
::-webkit-scrollbar-thumb{background:#d4b86a;border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:#c9a84c}

/* ── Animations ── */
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin 1s linear infinite}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .25s cubic-bezier(.22,1,.36,1)}

@keyframes goldPulse{0%,100%{box-shadow:0 0 0 0 rgba(201,168,76,0)}50%{box-shadow:0 0 0 4px rgba(201,168,76,0.18)}}

@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

/* ── Interactive button/card lift ── */
button{cursor:pointer;transition:transform .12s ease,box-shadow .12s ease,opacity .12s ease,background .15s ease,border-color .15s ease,color .15s ease}
button:active:not(:disabled){transform:scale(0.97)!important}

/* ── Gold glow focus ── */
input:focus,button:focus-visible{outline:2px solid rgba(201,168,76,0.55);outline-offset:2px}

/* ── Card hover lift with gold shadow ── */
.card-hover{transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease}
.card-hover:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(201,168,76,0.14)}

/* ── Nav item active indicator ── */
.nav-active-glow{box-shadow:inset 0 0 0 1px rgba(201,168,76,0.5),0 2px 8px rgba(201,168,76,0.12)}

/* ── Gold gradient button shine ── */
.btn-gold-shine{position:relative;overflow:hidden}
.btn-gold-shine::after{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.25),transparent);transition:left .4s ease}
.btn-gold-shine:hover::after{left:140%}

/* ── Stat card shimmer on hover ── */
.stat-shimmer{position:relative;overflow:hidden}
.stat-shimmer::before{content:'';position:absolute;inset:0;background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,0.55) 50%,transparent 60%);background-size:200% 100%;opacity:0;transition:opacity .2s}
.stat-shimmer:hover::before{opacity:1;animation:shimmer .6s ease forwards}

/* ── Collapsible header hover ── */
.collapsible-header:hover{background:rgba(201,168,76,0.06)!important}

/* ── Recording card accent border glow ── */
.recording-card:hover{box-shadow:0 4px 20px rgba(0,0,0,0.07),0 0 0 1px rgba(201,168,76,0.3)}

/* ── Tab underline animation ── */
.tab-item{position:relative}
.tab-item::after{content:'';position:absolute;bottom:-1px;left:50%;right:50%;height:2px;background:#c9a84c;transition:left .2s ease,right .2s ease}
.tab-item.tab-active::after{left:0;right:0}

/* ── Boot loader ── */
#boot-loader{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px;font-family:system-ui,sans-serif}
#boot-spinner{width:32px;height:32px;border:3px solid #e5e7eb;border-top-color:#c9a84c;border-radius:50%;animation:spin .8s linear infinite}
#boot-msg{font-size:.85rem;color:#6b7280}
</style>
</head>
<body>
<script>window.__API_BASE__='__RAILWAY_URL__';</script>
<div id="root">
  <div id="boot-loader">
    <div style="font-size:1.1rem;font-weight:700;color:#a07830">Call Intelligence</div>
    <div id="boot-spinner"></div>
    <div id="boot-msg">Loading…</div>
  </div>
</div>
<script>
window.onerror=function(msg,src,line,col,err){
  var el=document.getElementById('boot-loader');
  if(el)el.innerHTML='<div style="padding:24px;font-family:monospace;color:#dc2626;max-width:600px">'
    +'<div style="font-size:1rem;font-weight:700;margin-bottom:8px">JS Error</div>'
    +'<div style="font-size:.8rem;word-break:break-all">'+(err&&err.stack?err.stack:msg)+'</div>'
    +'<div style="margin-top:12px;font-size:.75rem;color:#6b7280">'+src+':'+line+'</div>'
    +'<button onclick="location.reload()" style="margin-top:12px;padding:6px 14px;background:#c9a84c;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:.8rem">Reload</button>'
    +'</div>';
  return false;
};
</script>
<script src="/static/app.js"></script>
</body>
</html>
