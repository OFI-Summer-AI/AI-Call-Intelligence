<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Transcription</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh;display:flex;flex-direction:column}
        .header{padding:20px 28px 0;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #1e2535;padding-bottom:16px}
        .header-title{display:flex;align-items:center;gap:10px}
        .header-title .dot{width:8px;height:8px;border-radius:50%;background:#c9a84c;box-shadow:0 0 8px #c9a84c}
        .header-title .dot.idle{background:#475569;box-shadow:none}
        .header-title h1{font-size:1rem;font-weight:700;color:#f1f5f9;letter-spacing:.01em}
        .header-title span{font-size:.75rem;color:#64748b;margin-left:4px}

        .tab-bar{display:flex;gap:0;padding:0 28px;background:#0f1117;border-bottom:1px solid #1e2535}
        .tab-btn{padding:12px 24px;font-size:.8rem;font-weight:600;border:none;background:transparent;color:#64748b;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;letter-spacing:.04em;text-transform:uppercase}
        .tab-btn.active{color:#c9a84c;border-bottom-color:#c9a84c}
        .tab-btn:hover:not(.active){color:#94a3b8}

        .tab-panel{display:none;flex:1;flex-direction:column;padding:20px 28px;gap:16px}
        .tab-panel.active{display:flex}

        .controls{display:flex;align-items:center;gap:12px;background:#161b27;border:1px solid #1e2535;border-radius:14px;padding:16px 20px}
        .btn{display:flex;align-items:center;gap:8px;padding:9px 20px;border:none;border-radius:9px;font-size:.82rem;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.02em}
        .btn-start{background:linear-gradient(135deg,#c9a84c,#a07830);color:#fff}
        .btn-start:hover:not(:disabled){filter:brightness(1.1);transform:translateY(-1px)}
        .btn-start:disabled{opacity:.4;cursor:not-allowed;transform:none}
        .btn-stop{background:#1e2535;color:#e2e8f0;border:1px solid #374151}
        .btn-stop:hover:not(:disabled){background:#2d3748}
        .btn-stop:disabled{opacity:.4;cursor:not-allowed}
        .btn-gold{background:linear-gradient(135deg,#c9a84c,#a07830);color:#fff;border:none}
        .btn-gold:hover:not(:disabled){filter:brightness(1.1)}
        .btn-green:disabled{opacity:.4;cursor:not-allowed}
        .status-text{margin-left:auto;font-size:.8rem;color:#64748b;font-weight:500}
        .status-ok{color:#c9a84c}
        .status-err{color:#e2e8f0}
        .status-gold{color:#c9a84c}

        .waveform{height:3px;background:#1e2535;border-radius:2px;overflow:hidden;margin:0}
        .waveform-inner{height:100%;width:0;background:linear-gradient(90deg,#c9a84c,#a07830);border-radius:2px;transition:width .3s}

        .transcript-box{flex:1;background:#0d1117;border:1px solid #1e2535;border-radius:14px;padding:16px;overflow-y:auto;min-height:280px;max-height:calc(100vh - 320px)}
        .placeholder{color:#334155;font-size:.85rem;text-align:center;padding:40px 20px;font-style:italic}

        .entry{display:flex;flex-direction:column;gap:4px;padding:10px 14px;margin:6px 0;background:#161b27;border:1px solid #1e2535;border-left:3px solid #c9a84c;border-radius:0 10px 10px 0;animation:slideIn .25s ease}
        .entry.screen-entry{border-left-color:#a07830}
        @keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
        .entry-time{font-size:.7rem;color:#c9a84c;font-weight:700;font-family:monospace}
        .entry-text{font-size:.88rem;color:#cbd5e1;line-height:1.5}

        .config-bar{display:flex;align-items:center;gap:16px;background:#161b27;border:1px solid #1e2535;border-radius:12px;padding:12px 18px}
        .config-label{font-size:.75rem;color:#64748b;font-weight:600;letter-spacing:.03em;text-transform:uppercase;white-space:nowrap}
        .config-input{background:#0d1117;border:1px solid #2d3748;border-radius:7px;padding:5px 10px;color:#e2e8f0;font-size:.8rem;transition:border-color .2s}
        .config-input:focus{outline:none;border-color:#c9a84c}

        .timer{font-size:.8rem;font-weight:700;color:#c9a84c;font-family:monospace;margin-left:auto}

        .row{display:flex;align-items:center;gap:10px}

        ::-webkit-scrollbar{width:4px}
        ::-webkit-scrollbar-track{background:#0d1117}
        ::-webkit-scrollbar-thumb{background:#2d3748;border-radius:2px}
        ::-webkit-scrollbar-thumb:hover{background:#c9a84c}
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">
            <div class="dot idle" id="dot"></div>
            <h1>Live Transcription</h1>
            <span>Whisper AI</span>
        </div>
        <div style="font-size:.72rem;color:#334155" id="wsHostLabel">ws://localhost:8000</div>
    </div>

    <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('mic',this)">Microphone</button>
        <button class="tab-btn" onclick="switchTab('screen',this)">Screen Capture</button>
    </div>

    <!-- Mic Tab -->
    <div id="tab-mic" class="tab-panel active">
        <div class="controls">
            <button class="btn btn-start" id="startBtn" onclick="startRecording()">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="8"/></svg>
                Start Recording
            </button>
            <button class="btn btn-stop" id="stopBtn" onclick="stopRecording()" disabled>
                <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
                Stop
            </button>
            <span class="status-text" id="status">Ready</span>
        </div>
        <div class="waveform"><div class="waveform-inner" id="waveform-bar"></div></div>
        <div class="transcript-box" id="transcript-box">
            <p class="placeholder">Click "Start Recording" to begin live transcription…</p>
        </div>
    </div>

    <!-- Screen Tab -->
    <div id="tab-screen" class="tab-panel">
        <div class="controls" style="flex-wrap:wrap;gap:10px">
            <button class="btn btn-start" id="scStartBtn" onclick="startScreenCapture()">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                Capture Screen
            </button>
            <button class="btn btn-stop" id="scStopBtn" onclick="stopScreenCapture()" disabled>
                <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
                Stop
            </button>
            <button class="btn btn-gold" id="scDownloadBtn" onclick="downloadRecording()" disabled>
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Save
            </button>
            <label style="display:flex;align-items:center;gap:6px;font-size:.78rem;color:#64748b;cursor:pointer">
                <input type="checkbox" id="scIncludeMic" style="accent-color:#c9a84c">
                Mix mic
            </label>
            <span class="timer" id="scTimer">00:00:00</span>
            <span class="status-text" id="scStatus" style="margin-left:0">Ready</span>
        </div>
        <div class="waveform"><div class="waveform-inner" id="sc-waveform-bar"></div></div>
        <div class="transcript-box" id="sc-transcript-box">
            <p class="placeholder">Share a screen or window — check "Share audio" when prompted.</p>
        </div>
    </div>

    <!-- Config bar -->
    <div style="padding:0 28px 20px">
        <div class="config-bar">
            <span class="config-label">WS URL</span>
            <input class="config-input" type="text" id="wsUrl" style="flex:1">
            <span class="config-label">Chunk ms</span>
            <input class="config-input" type="number" id="chunkMs" value="2000" style="width:80px">
        </div>
    </div>

    <script>
        // Auto-detect WebSocket URL from current page location.
        // Works for local (ws://localhost:8000) and deployed (wss://your-app.railway.app).
        // If you need to override (e.g. Vercel frontend → Railway backend), set window.__API_BASE__
        // in index.html before this iframe loads, e.g.:
        //   window.__API_BASE__ = 'https://your-app.railway.app';
        (function(){
            var loc=window.location;
            var wsProto=loc.protocol==='https:'?'wss:':'ws:';
            var wsBase=wsProto+'//'+loc.host;
            document.getElementById('wsUrl').value=wsBase+'/ws/transcribe';
            document.getElementById('wsHostLabel').textContent=wsBase;
        })();

        let mediaRecorder,ws,isRecording=false,micChunks=[];
        let scMediaRecorder,scWs,scFullRecorder,scIsRecording=false,scChunks=[],scTimerInterval,scSeconds=0;

        function getBase(){return document.getElementById('wsUrl').value.replace('ws://','http://').replace('wss://','https://').replace('/ws/transcribe','');}

        function setDot(on){var d=document.getElementById('dot');d.className='dot'+(on?'':' idle');}

        function switchTab(tab,btn){
            document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
            document.getElementById('tab-'+tab).classList.add('active');
            btn.classList.add('active');
        }

        function uploadToServer(blob,filename,statusEl){
            var fd=new FormData(); fd.append('file',blob,filename);
            if(statusEl)statusEl.innerHTML='<span class="status-gold">Saving…</span>';
            fetch(getBase()+'/api/upload-recording',{method:'POST',body:fd})
                .then(r=>r.json())
                .then(d=>{
                    if(statusEl)statusEl.innerHTML='<span class="status-ok">Saved — running analysis…</span>';
                    // Trigger full pipeline analysis (same as upload flow in the main app)
                    return fetch(getBase()+'/api/process?filename='+encodeURIComponent(d.filename));
                })
                .then(r=>r.json())
                .then(d=>{
                    var link='<a href="'+getBase()+'/" target="_blank" style="color:#c9a84c;text-decoration:underline">View in dashboard →</a>';
                    if(statusEl)statusEl.innerHTML='<span class="status-ok">Analysis started (job: '+d.job_id+') · '+link+'</span>';
                })
                .catch(()=>{if(statusEl)statusEl.innerHTML='<span class="status-err">Save failed</span>';});
        }

        // ── Mic ──
        function startRecording(){
            var wsUrl=document.getElementById('wsUrl').value;
            var chunkMs=parseInt(document.getElementById('chunkMs').value)||2000;
            micChunks=[];
            navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
                ws=new WebSocket(wsUrl);
                ws.onopen=()=>{
                    document.getElementById('status').innerHTML='<span class="status-ok">Recording & Transcribing</span>';
                    document.getElementById('startBtn').disabled=true;
                    document.getElementById('stopBtn').disabled=false;
                    setDot(true);
                };
                ws.onmessage=e=>{var d=JSON.parse(e.data);if(d.type==='transcription')addEntry('transcript-box',d.time,d.text,false);};
                ws.onerror=()=>{document.getElementById('status').innerHTML='<span class="status-err">Connection error — server running?</span>';setDot(false);};
                ws.onclose=()=>{if(isRecording)stopRecording();};
                mediaRecorder=new MediaRecorder(stream,{mimeType:'audio/webm;codecs=opus'});
                mediaRecorder.ondataavailable=e=>{
                    if(e.data.size>0){
                        micChunks.push(e.data);
                        if(ws&&ws.readyState===WebSocket.OPEN)ws.send(e.data);
                        var bar=document.getElementById('waveform-bar');
                        bar.style.width=Math.random()*60+40+'%';
                        setTimeout(()=>bar.style.width='0%',300);
                    }
                };
                mediaRecorder.start(chunkMs);
                isRecording=true;
            }).catch(()=>{document.getElementById('status').innerHTML='<span class="status-err">Microphone access denied</span>';});
        }

        function stopRecording(){
            isRecording=false;
            if(mediaRecorder&&mediaRecorder.state!=='inactive'){mediaRecorder.stop();mediaRecorder.stream.getTracks().forEach(t=>t.stop());}
            if(ws)ws.close();
            document.getElementById('startBtn').disabled=false;
            document.getElementById('stopBtn').disabled=true;
            document.getElementById('waveform-bar').style.width='0%';
            setDot(false);
            if(micChunks.length>0){
                var blob=new Blob(micChunks,{type:'audio/webm'});
                uploadToServer(blob,'mic_'+new Date().toISOString().slice(0,19).replace(/:/g,'-')+'.webm',document.getElementById('status'));
            } else {
                document.getElementById('status').innerHTML='<span class="status-gold">Stopped</span>';
            }
        }

        function addEntry(boxId,time,text,isScreen){
            var box=document.getElementById(boxId);
            var ph=box.querySelector('.placeholder');if(ph)ph.remove();
            var el=document.createElement('div');
            el.className='entry'+(isScreen?' screen-entry':'');
            el.innerHTML='<div class="entry-time">'+time+'</div><div class="entry-text">'+text+'</div>';
            box.appendChild(el);
            box.scrollTop=box.scrollHeight;
        }

        // ── Screen ──
        function fmt(s){return[Math.floor(s/3600),Math.floor((s%3600)/60),s%60].map(n=>String(n).padStart(2,'0')).join(':');}

        async function startScreenCapture(){
            var wsUrl=document.getElementById('wsUrl').value;
            var chunkMs=parseInt(document.getElementById('chunkMs').value)||2000;
            try{
                var ds=await navigator.mediaDevices.getDisplayMedia({video:true,audio:true});
                var at=ds.getAudioTracks();
                if(!at.length){document.getElementById('scStatus').innerHTML='<span class="status-err">No audio — tick "Share audio"</span>';ds.getTracks().forEach(t=>t.stop());return;}
                var ctx=new AudioContext();
                var dest=ctx.createMediaStreamDestination();
                // Screen audio at normal volume
                ctx.createMediaStreamSource(new MediaStream(at)).connect(dest);
                if(document.getElementById('scIncludeMic').checked){
                    try{
                        var ms=await navigator.mediaDevices.getUserMedia({audio:true});
                        // Boost mic gain 2x so your voice isn't drowned out by screen audio
                        var micGain=ctx.createGain(); micGain.gain.value=2.0;
                        ctx.createMediaStreamSource(ms).connect(micGain);
                        micGain.connect(dest);
                    }catch(e){}
                }
                scWs=new WebSocket(wsUrl);
                scWs.onopen=()=>{
                    document.getElementById('scStatus').innerHTML='<span class="status-ok">Capturing & Transcribing</span>';
                    document.getElementById('scStartBtn').disabled=true;
                    document.getElementById('scStopBtn').disabled=false;
                    setDot(true);
                };
                scWs.onmessage=e=>{var d=JSON.parse(e.data);if(d.type==='transcription')addEntry('sc-transcript-box',d.time,d.text,true);};
                scWs.onerror=()=>{document.getElementById('scStatus').innerHTML='<span class="status-err">WebSocket error</span>';};
                scWs.onclose=()=>{if(scIsRecording)stopScreenCapture();};
                scMediaRecorder=new MediaRecorder(dest.stream,{mimeType:'audio/webm;codecs=opus'});
                scMediaRecorder.ondataavailable=e=>{
                    if(e.data.size>0&&scWs&&scWs.readyState===WebSocket.OPEN){
                        scWs.send(e.data);
                        var bar=document.getElementById('sc-waveform-bar');
                        bar.style.width=Math.random()*60+40+'%';
                        setTimeout(()=>bar.style.width='0%',300);
                    }
                };
                scMediaRecorder.start(chunkMs);
                scChunks=[];
                scFullRecorder=new MediaRecorder(ds,{mimeType:'video/webm;codecs=vp9,opus'});
                scFullRecorder.ondataavailable=e=>{if(e.data.size>0)scChunks.push(e.data);};
                scFullRecorder.start(1000);
                scSeconds=0;
                document.getElementById('scTimer').textContent='00:00:00';
                scTimerInterval=setInterval(()=>{scSeconds++;document.getElementById('scTimer').textContent=fmt(scSeconds);},1000);
                ds.getVideoTracks()[0].onended=()=>stopScreenCapture();
                scIsRecording=true;
            }catch(e){document.getElementById('scStatus').innerHTML='<span class="status-err">Screen capture denied</span>';}
        }

        function stopScreenCapture(){
            scIsRecording=false;
            clearInterval(scTimerInterval);
            if(scMediaRecorder&&scMediaRecorder.state!=='inactive')scMediaRecorder.stop();
            if(scFullRecorder&&scFullRecorder.state!=='inactive')scFullRecorder.stop();
            if(scWs)scWs.close();
            [scMediaRecorder,scFullRecorder].forEach(r=>{if(r&&r.stream)r.stream.getTracks().forEach(t=>t.stop());});
            document.getElementById('scStatus').innerHTML='<span class="status-gold">Stopped · '+fmt(scSeconds)+'</span>';
            document.getElementById('scStartBtn').disabled=false;
            document.getElementById('scStopBtn').disabled=true;
            document.getElementById('sc-waveform-bar').style.width='0%';
            setDot(false);
            if(scChunks.length>0){
                document.getElementById('scDownloadBtn').disabled=false;
                var blob=new Blob(scChunks,{type:'video/webm'});
                uploadToServer(blob,'meeting_'+new Date().toISOString().slice(0,19).replace(/:/g,'-')+'.webm',document.getElementById('scStatus'));
            }
        }

        function downloadRecording(){
            if(!scChunks.length)return;
            var a=document.createElement('a');
            a.href=URL.createObjectURL(new Blob(scChunks,{type:'video/webm'}));
            a.download='meeting_'+new Date().toISOString().slice(0,19).replace(/:/g,'-')+'.webm';
            document.body.appendChild(a);a.click();document.body.removeChild(a);
        }
    </script>
</body>
</html>
